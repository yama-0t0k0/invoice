const b642buf = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
async function decrypt(pw){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b642buf(DATA.salt), iterations:DATA.iter, hash:"SHA-256"},
    keyMaterial, {name:"AES-GCM", length:256}, false, ["decrypt"]
  );
  const ptBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:b642buf(DATA.iv)}, key, b642buf(DATA.ct));
  return new TextDecoder().decode(ptBuf);
}
document.getElementById("f").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const err = document.getElementById("err");
  err.textContent = "";
  try {
    const html = await decrypt(document.getElementById("pw").value);
    document.open(); document.write(html); document.close();
  } catch (_) {
    err.textContent = "パスワードが違います。";
  }
});
